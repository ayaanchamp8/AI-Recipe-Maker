kind = "web"
previewPath = "/"
title = "AI Recipe Finder"
version = "1.0.0"
id = "artifacts/recipe-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23848

[services.development]
run = "pnpm --filter @workspace/recipe-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/recipe-finder", "run", "build" ]
publicDir = "artifacts/recipe-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23848"
BASE_PATH = "/"
